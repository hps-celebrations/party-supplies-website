name: Deploy Hugo Site to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo (Extended)
        run: |
          sudo apt-get update
          sudo apt-get install -y hugo
          hugo version

      - name: Cache Hugo resources
        uses: actions/cache@v4
        with:
          path: /home/runner/work/party-supplies-website/party-supplies-website/resources
          key: ${{ runner.os }}-hugomod-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-hugomod-

      - name: Verify site directory
        run: |
          pwd
          ls -la
          ls -la party-supplies-website
          ls -la party-supplies-website | grep hugo.toml || true

      - name: Download Hugo modules
        run: |
          cd party-supplies-website
          hugo mod get -u

      - name: Build Hugo site
        run: |
          cd party-supplies-website
          hugo --minify --gc

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: hugo-build
          path: party-supplies-website/public/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: hugo-build
          path: ./site-build

      - name: Prepare deployment
        run: |
          # Remove old site files but keep .git and important files
          find . -maxdepth 1 -type f \( -name "*.html" -o -name "*.xml" \) -delete
          find . -maxdepth 1 -type d \( -name "js" -o -name "css" -o -name "images" -o -name "products" -o -name "blog" -o -name "contact" -o -name "categories" -o -name "tags" -o -name "plugins" -o -name "scss" -o -name "faq" -o -name "terms-conditions" \) -exec rm -rf {} + 2>/dev/null || true
          # Copy new site files to root
          cp -r ./site-build/* ./
          rm -rf ./site-build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push
        run: |
          git add -A
          git commit -m "Deploy Hugo site to GitHub Pages" || echo "No changes to commit"
          git push origin main
