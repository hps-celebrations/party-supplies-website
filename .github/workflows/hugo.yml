name: Deploy Hugo Site to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo (Extended)
        run: |
          sudo apt-get update
          sudo apt-get install -y hugo
          hugo version

      - name: Cache Hugo resources
        uses: actions/cache@v4
        with:
          path: /home/runner/work/party-supplies-website/party-supplies-website/resources
          key: ${{ runner.os }}-hugomod-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-hugomod-

      - name: Verify site directory
        run: |
          pwd
          ls -la
          ls -la party-supplies-website
          ls -la party-supplies-website | grep hugo.toml || true

      - name: Download Hugo modules
        run: |
          cd party-supplies-website
          hugo mod get -u

      - name: Build Hugo site
        run: |
          cd party-supplies-website
          hugo --minify --gc

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: hugo-build
          path: party-supplies-website/public/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: hugo-build
          path: public

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          keep_files: false
          allow_empty_commit: true
          commit_message: "Deploy site to GitHub Pages from workflow"
